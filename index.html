<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DMX DIP Calculator PRO</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

/* INPUT */
input {
  padding: 10px;
  font-size: 20px;
  width: 120px;
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

/* PANEL DIP */
.dip-panel {
  margin-top: 40px;
  background: #0b5ed7;
  display: inline-block;
  padding: 15px 10px 10px;
  border-radius: 10px;
  box-shadow: inset 0 0 10px #000;
}

/* TEXTO ON */
.on-label {
  color: white;
  font-size: 12px;
  margin-bottom: 10px;
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 6px;
}

/* SWITCH */
.switch {
  width: 35px;
  height: 80px;
  background: #0d6efd;
  border-radius: 4px;
  border: 1px solid #003c99;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 4px;
}

/* PALANCA */
.toggle {
  width: 22px;
  height: 30px;
  background: #eee;
  border-radius: 2px;
  transition: 0.2s;
}

/* ON = arriba */
.on .toggle {
  transform: translateY(-20px);
  background: white;
}

/* NUMERO */
.number {
  font-size: 11px;
  color: white;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  .switch {
    width: 30px;
    height: 70px;
  }

  .toggle {
    width: 18px;
    height: 26px;
  }
}
</style>

</head>
<body>

<h1>Calculador DIP Switch DMX</h1>

<input type="number" id="dmx" min="1" max="512" placeholder="1-512">
<button onclick="calcular()">Calcular</button>

<div class="dip-panel">
  <div class="on-label">ON ↑</div>
  <div class="container" id="switches"></div>
</div>

<script>
let pesos = [1,2,4,8,16,32,64,128,256];

function calcular() {
  let valor = parseInt(document.getElementById("dmx").value);

  if (valor < 1 || valor > 512 || isNaN(valor)) return;

  let estados = new Array(9).fill(false);

  // 🔥 lógica correcta (de mayor a menor)
  for (let i = pesos.length - 1; i >= 0; i--) {
    if (valor >= pesos[i]) {
      valor -= pesos[i];
      estados[i] = true;
    }
  }

  let html = "";

  // mostrar de SW1 a SW9
  for (let i = 0; i < pesos.length; i++) {
    html += `
      <div class="switch ${estados[i] ? 'on' : ''}">
        <div class="toggle"></div>
        <div class="number">${i + 1}</div>
      </div>
    `;
  }

  document.getElementById("switches").innerHTML = html;
}
</script>

</body>
</html>
