<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DMX DIP Calculator PRO</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

h1 {
  margin-bottom: 20px;
}

/* INPUT */
input {
  padding: 12px;
  font-size: 22px;
  width: 140px;
  text-align: center;
  border-radius: 6px;
  border: none;
  outline: none;
}

/* PANEL DIP */
.dip-panel {
  margin-top: 40px;
  background: #0b5ed7;
  display: inline-block;
  padding: 15px 10px 10px;
  border-radius: 10px;
  box-shadow: inset 0 0 10px #000;
}

/* TEXTO ON */
.on-label {
  color: white;
  font-size: 12px;
  margin-bottom: 10px;
}

/* CONTENEDOR */
.container {
  display: flex;
  gap: 6px;
  justify-content: center;
}

/* SWITCH */
.switch {
  width: 35px;
  height: 80px;
  background: #0d6efd;
  border-radius: 4px;
  border: 1px solid #003c99;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  padding: 4px;
  cursor: pointer;
}

/* PALANCA */
.toggle {
  width: 22px;
  height: 30px;
  background: #eee;
  border-radius: 2px;
  transition: 0.2s;
}

/* ON */
.on .toggle {
  transform: translateY(-20px);
}

/* NUMERO */
.number {
  font-size: 11px;
  color: white;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
  .switch {
    width: 30px;
    height: 70px;
  }

  .toggle {
    width: 18px;
    height: 26px;
  }
}
</style>

</head>
<body>

<h1>Calculador DIP Switch DMX</h1>

<input type="number" id="dmx" min="1" max="512" placeholder="1-512">

<div class="dip-panel">
  <div class="on-label">ON ↑</div>
  <div class="container" id="switches"></div>
</div>

<script>
let pesos = [1,2,4,8,16,32,64,128,256];
let estados = new Array(9).fill(false);

// INIT
window.onload = () => render();

// INPUT → SWITCHES
document.getElementById("dmx").addEventListener("input", desdeInput);

function desdeInput() {
  let valor = parseInt(document.getElementById("dmx").value);
  estados = new Array(9).fill(false);

  if (!isNaN(valor) && valor >= 1 && valor <= 512) {
    for (let i = pesos.length - 1; i >= 0; i--) {
      if (valor >= pesos[i]) {
        valor -= pesos[i];
        estados[i] = true;
      }
    }
  }

  render();
}

// SWITCHES → INPUT
function toggleSwitch(index) {
  estados[index] = !estados[index];

  let total = 0;
  for (let i = 0; i < pesos.length; i++) {
    if (estados[i]) total += pesos[i];
  }

  document.getElementById("dmx").value = total;
  render();
}

// RENDER
function render() {
  let html = "";

  for (let i = 0; i < pesos.length; i++) {
    html += `
      <div class="switch ${estados[i] ? 'on' : ''}" onclick="toggleSwitch(${i})">
        <div class="toggle"></div>
        <div class="number">${i + 1}</div>
      </div>
    `;
  }

  document.getElementById("switches").innerHTML = html;
}
</script>

</body>
</html>
