<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Calculador DMX DIP Switch</title>
  <style>
    body { font-family: Arial; text-align: center; background: #111; color: #fff; }
    input { padding: 10px; font-size: 18px; }
    .switches { margin-top: 20px; }
    .switch { display: inline-block; margin: 5px; padding: 10px; border: 1px solid #555; }
    .on { background: lime; color: black; }
  </style>
</head>
<body>

<h1>Calculador DIP Switch DMX</h1>

<input type="number" id="dmx" placeholder="Dirección DMX (1-512)" min="1" max="512">
<button onclick="calcular()">Calcular</button>

<div class="switches" id="resultado"></div>

<script>
function calcular() {
  let valor = parseInt(document.getElementById("dmx").value);
  let pesos = [1,2,4,8,16,32,64,128,256];
  let html = "";

  for (let i = pesos.length - 1; i >= 0; i--) {
    if (valor >= pesos[i]) {
      valor -= pesos[i];
      html += `<div class="switch on">SW ${i+1}<br>ON</div>`;
    } else {
      html += `<div class="switch">SW ${i+1}<br>OFF</div>`;
    }
  }

  document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
