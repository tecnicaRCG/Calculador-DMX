<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DMX DIP Calculator PRO</title>

<style>
body {
  background: #0a0a0a;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

input {
  padding: 10px;
  font-size: 20px;
  width: 120px;
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

.container {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.switch {
  width: 45px;
  height: 100px;
  background: #1a1a1a;
  border-radius: 6px;
  border: 2px solid #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 5px;
}

.top {
  font-size: 10px;
  color: #aaa;
}

.number {
  font-size: 12px;
  color: #888;
}

.toggle {
  width: 28px;
  height: 40px;
  background: #444;
  border-radius: 3px;
  transition: 0.2s;
}

.on .toggle {
  transform: translateY(-20px);
  background: lime;
  box-shadow: 0 0 8px lime;
}

.on {
  border-color: lime;
}
</style>

</head>
<body>

<h1>DMX DIP Calculator</h1>

<input type="number" id="dmx" min="1" max="512" placeholder="1-512">
<button onclick="calcular()">Calcular</button>

<div class="container" id="switches"></div>

<script>
let pesos = [1,2,4,8,16,32,64,128,256];

function calcular() {
  let valor = parseInt(document.getElementById("dmx").value);
  let html = "";

  for (let i = 0; i < pesos.length; i++) {
    let activo = false;

    if (valor >= pesos[i]) {
      valor -= pesos[i];
      activo = true;
    }

    html += `
      <div class="switch ${activo ? 'on' : ''}">
        <div class="top">ON</div>
        <div class="toggle"></div>
        <div class="number">${i + 1}</div>
      </div>
    `;
  }

  document.getElementById("switches").innerHTML = html;
}
</script>

</body>
</html>
